<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="./firebase-config.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0d1222;
  color:#fff;
}
.screen { display:none; padding:20px; }
.active { display:block; }

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111827;
}
.nav button {
  flex:1;
  padding:15px;
  background:none;
  border:none;
  color:#aaa;
}
.nav button.active {
  color:#4f7dff;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <h2>Login</h2>
  <button onclick="login()">Mit Google anmelden</button>
</div>

<!-- APP -->
<div id="app" class="screen">
  <h2 id="welcome"></h2>

  <div id="dashboard" class="screen active">
    <h3>Dashboard</h3>
  </div>

  <div id="calendar" class="screen">
    <h3>Kalender</h3>
  </div>

  <div id="challenges" class="screen">
    <h3>Challenges</h3>
  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav" style="display:none;">
  <button onclick="setView('dashboard')" id="btn-dashboard">Dashboard</button>
  <button onclick="setView('calendar')" id="btn-calendar">Kalender</button>
  <button onclick="setView('challenges')" id="btn-challenges">Challenges</button>
</div>

<script>
let db;

function show(id) {
  document.querySelectorAll(".screen").forEach(e => e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function setView(v) {
  ["dashboard","calendar","challenges"].forEach(x=>{
    document.getElementById(x).classList.remove("active");
    document.getElementById("btn-"+x).classList.remove("active");
  });
  document.getElementById(v).classList.add("active");
  document.getElementById("btn-"+v).classList.add("active");
}

async function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  const res = await firebase.auth().signInWithPopup(provider);
  startApp(res.user);
}

function startApp(user) {
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("nav").style.display="flex";

  document.getElementById("welcome").innerText =
    "Hallo " + user.displayName;

  loadData(user.uid);
}

async function loadData(uid) {
  const doc = await db.collection("users").doc(uid).get();

  if (!doc.exists) {
    console.log("Neuer User – keine Demo Daten");
    return;
  }

  const data = doc.data();

  console.log("User Daten:", data);

  // HIER kannst du später rendern
}

firebase.auth().onAuthStateChanged(user=>{
  if (user) startApp(user);
});

window.onload = () => {
  db = firebase.firestore();
};
</script>

</body>
</html>
