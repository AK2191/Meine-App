name: Change ZIP Update anwenden

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Pfad zur ZIP im Repository, leer = neueste ZIP in updates/"
        required: false
        default: ""
  push:
    paths:
      - "updates/*.zip"

permissions:
  contents: write

concurrency:
  group: change-zip-update
  cancel-in-progress: false

jobs:
  apply_zip_update:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Node vorbereiten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ZIP prüfen und anwenden
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: node scripts/applyZipUpdate.mjs "${{ github.event.inputs.zip_path }}"

      - name: Änderungen committen
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Keine Änderungen zum Committen."
            exit 0
          fi
          git config user.name "change-zip-update-bot"
          git config user.email "actions@github.com"
          VERSION="unknown"
          if [ -f ".change-update-version" ]; then
            VERSION="$(cat .change-update-version | tr -d '\r\n')"
            rm -f .change-update-version
          fi
          git add -A
          git commit -m "Update Change App auf v${VERSION} [skip ci]"
          git push

      - name: ZIP Übergabe bei Fehler bereinigen
        if: failure()
        run: |
          git config user.name "change-zip-update-bot"
          git config user.email "actions@github.com"
          git rm -f updates/*.zip || true
          if git diff --cached --quiet; then
            echo "Keine ZIP Übergabe zum Bereinigen."
            exit 0
          fi
          git commit -m "Fehlerhafte ZIP Übergabe entfernen [skip ci]"
          git push
